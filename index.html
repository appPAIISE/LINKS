<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAIISE | Links</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-dark: #141414;
            --netflix-gray: #2F2F2F;
            --brand-blue: #4cc9ff;
            --text-white: #FFFFFF;
            --text-gray: #B3B3B3;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* Reset e Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(229, 9, 20, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(76, 201, 255, 0.1) 0%, transparent 35%);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding-bottom: 80px; /* Espaço para o botão flutuante */
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--netflix-red);
            padding: 3px;
            background: #000;
            margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.4);
            transition: transform 0.5s ease;
            object-fit: cover;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            letter-spacing: 2px;
            color: var(--netflix-red);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            margin-bottom: 5px;
        }

        .description {
            color: var(--text-gray);
            font-size: 0.95rem;
            max-width: 300px;
            margin: 0 auto;
        }

        /* VIDEO SECTION */
        .featured-video {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-aspect {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .video-aspect iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        /* SECTIONS */
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 1px;
            margin: 25px 0 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-white);
        }

        .section-title::after {
            content: "";
            height: 2px;
            background: var(--netflix-red);
            flex-grow: 1;
        }

        /* SOCIAL GRID */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .social-item {
            background: var(--netflix-gray);
            border-radius: 8px;
            padding: 12px 5px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .social-item:hover {
            background: var(--netflix-red);
            transform: translateY(-3px);
        }

        .social-item svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .social-item span {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        /* LINKS LIST */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 12px 15px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            border-color: var(--netflix-red);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Miniaturas Circulares */
        .btn-thumb {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--netflix-red);
            flex-shrink: 0;
            background: #000;
        }

        .btn-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .link-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        /* BOTÃO FLUTUANTE DE COMPARTILHAR */
        .share-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: var(--netflix-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            z-index: 999;
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .share-btn:hover {
            transform: scale(1.1) rotate(10deg);
            background: #ff0f1b;
        }

        .share-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* FOOTER COMPACTO */
        footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid var(--glass-border);
            margin-top: 40px;
        }

        .footer-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: var(--netflix-red);
            margin-bottom: 5px;
        }

        .copyright {
            font-size: 0.7rem;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Animação */
        .animate {
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

    <script>
        // Função de Compartilhamento Dinâmica
        async function shareSite() {
            const shareData = {
                title: 'PAIISE OFICIAL',
                text: 'Acesse os links oficiais da PAIISE!',
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    await navigator.clipboard.writeText(window.location.href);
                    alert("Link copiado com sucesso!");
                }
            } catch (err) {
                console.log("Erro:", err);
            }
        }

        // Observer para disparar animações ao rolar
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = "1";
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.animate').forEach(el => observer.observe(el));
    </script>
